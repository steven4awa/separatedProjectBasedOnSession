name: Deploy Frontend to GitHub Pages

on:
  # 监听 push 到 main 分支（如果你的默认分支是 master，请改为 master）
  push:
    branches:
      - master

  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署，跳过正在运行的部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # 使用全局绝对路径变量，精准定位到前端目录
        working-directory: ${{ github.workspace }}/frontend
        run: npm install

      - name: Build project
        # 使用全局绝对路径变量
        working-directory: ${{ github.workspace }}/frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 同样使用绝对路径指定打包产物
          path: '${{ github.workspace }}/frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4